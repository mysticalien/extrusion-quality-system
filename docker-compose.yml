services:
  postgres:
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-extrusion_postgres}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-extrusion_quality}
      POSTGRES_USER: ${POSTGRES_USER:-extrusion_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-extrusion_password}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  mqtt:
    image: eclipse-mosquitto:2
    container_name: ${MQTT_CONTAINER_NAME:-extrusion_mqtt}
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./deploy/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  kafka:
    image: apache/kafka:4.0.0
    container_name: ${KAFKA_CONTAINER_NAME:-extrusion_kafka}
    ports:
      - "${KAFKA_HOST_PORT:-19092}:9092"
    environment:
      KAFKA_NODE_ID: ${KAFKA_NODE_ID:-1}
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:29092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_HOST_PORT:-19092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: ${KAFKA_NODE_ID:-1}@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:-1}
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: ${KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR:-1}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: ${KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:-1}
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: ${KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS:-0}
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "${KAFKA_AUTO_CREATE_TOPICS_ENABLE:-true}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list >/dev/null 2>&1"
        ]
      interval: 10s
      timeout: 10s
      retries: 20

  migrate:
    build:
      context: .
    container_name: extrusion_migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-extrusion_user}:${POSTGRES_PASSWORD:-extrusion_password}@postgres:5432/${POSTGRES_DB:-extrusion_quality}?sslmode=disable
    command:
      [
        "sh",
        "-c",
        "goose -dir /app/migrations postgres \"$${DATABASE_URL}\" up"
      ]
    restart: "no"

  backend:
    build:
      context: .
    container_name: ${BACKEND_CONTAINER_NAME:-extrusion_backend}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mqtt:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}

      SERVER_ADDR: ":8080"
      SERVER_READ_TIMEOUT: ${SERVER_READ_TIMEOUT:-5s}
      SERVER_WRITE_TIMEOUT: ${SERVER_WRITE_TIMEOUT:-10s}
      SERVER_READ_HEADER_TIMEOUT: ${SERVER_READ_HEADER_TIMEOUT:-3s}

      DATABASE_URL: postgres://${POSTGRES_USER:-extrusion_user}:${POSTGRES_PASSWORD:-extrusion_password}@postgres:5432/${POSTGRES_DB:-extrusion_quality}?sslmode=disable

      JWT_SECRET: ${JWT_SECRET:-change-me-local-secret-for-development}
      JWT_TOKEN_TTL: ${JWT_TOKEN_TTL:-24h}

      MQTT_ENABLED: ${MQTT_ENABLED:-true}
      MQTT_BROKER_URL: tcp://mqtt:1883
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID:-extrusion-backend}
      MQTT_TELEMETRY_TOPIC: ${MQTT_TELEMETRY_TOPIC:-extrusion/telemetry/readings}
      MQTT_CONNECT_TIMEOUT: ${MQTT_CONNECT_TIMEOUT:-10s}
      MQTT_QOS: ${MQTT_QOS:-0}
      MQTT_WORKER_COUNT: ${MQTT_WORKER_COUNT:-4}
      MQTT_QUEUE_SIZE: ${MQTT_QUEUE_SIZE:-256}

      KAFKA_ENABLED: ${KAFKA_ENABLED:-true}
      KAFKA_BROKERS: kafka:29092
      KAFKA_TELEMETRY_TOPIC: ${KAFKA_TELEMETRY_TOPIC:-extrusion.telemetry.raw}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-extrusion-quality-service}
      KAFKA_WRITE_TIMEOUT: ${KAFKA_WRITE_TIMEOUT:-10s}
      KAFKA_READ_TIMEOUT: ${KAFKA_READ_TIMEOUT:-10s}
      KAFKA_RETRY_DELAY: ${KAFKA_RETRY_DELAY:-2s}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8080/health >/dev/null 2>&1"
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    command: ["/app/server"]

  telemetry-simulator:
    build:
      context: .
    container_name: ${SIMULATOR_CONTAINER_NAME:-extrusion_telemetry_simulator}
    depends_on:
      backend:
        condition: service_healthy
      mqtt:
        condition: service_started
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}

      SIMULATOR_INTERVAL: ${SIMULATOR_INTERVAL:-2s}
      SIMULATOR_REQUEST_TIMEOUT: ${SIMULATOR_REQUEST_TIMEOUT:-10s}
      SIMULATOR_SOURCE_ID: ${SIMULATOR_SOURCE_ID:-mqtt-simulator}

      SIMULATOR_MODE: ${SIMULATOR_MODE:-anomaly}
      SIMULATOR_MQTT_BROKER_URL: tcp://mqtt:1883
      SIMULATOR_MQTT_CLIENT_ID: ${SIMULATOR_MQTT_CLIENT_ID:-extrusion-simulator}
      SIMULATOR_MQTT_TOPIC: ${SIMULATOR_MQTT_TOPIC:-extrusion/telemetry/readings}
      SIMULATOR_MQTT_QOS: ${SIMULATOR_MQTT_QOS:-0}
      SIMULATOR_MQTT_TIMEOUT: ${SIMULATOR_MQTT_TIMEOUT:-10s}
    command: ["/app/simulator"]

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log: