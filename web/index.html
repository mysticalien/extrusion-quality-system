<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Extrusion Quality Dashboard</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 24px;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #1f2933;
        }

        header {
            margin-bottom: 24px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 28px;
        }

        .subtitle {
            color: #667085;
            font-size: 14px;
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .quality-card,
        .section {
            padding: 20px;
            border-radius: 14px;
            background: white;
            box-shadow: 0 2px 10px rgba(15, 23, 42, 0.08);
        }

        .quality-card {
            padding: 24px;
        }

        .quality-title {
            font-size: 14px;
            color: #667085;
            margin-bottom: 8px;
        }

        .quality-value {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .quality-state {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            background: #e5e7eb;
        }

        .section h2 {
            margin: 0 0 16px;
            font-size: 20px;
        }

        .parameters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 14px;
        }

        .parameter-card {
            padding: 16px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            background: #fafafa;
        }

        .parameter-name {
            font-size: 14px;
            color: #667085;
            margin-bottom: 8px;
        }

        .parameter-value {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .parameter-meta {
            font-size: 12px;
            color: #667085;
            line-height: 1.4;
        }

        .events-list,
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .event-card,
        .history-card {
            padding: 16px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            background: #fafafa;
        }

        .event-header,
        .history-header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 8px;
        }

        .event-level,
        .history-value {
            font-weight: 700;
        }

        .event-level {
            text-transform: uppercase;
        }

        .event-status,
        .history-time {
            font-size: 13px;
            color: #667085;
        }

        .event-message {
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .event-meta,
        .history-meta {
            font-size: 12px;
            color: #667085;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .history-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
            align-items: end;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .checkbox-group {
            justify-content: center;
            min-height: 58px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1f2933;
            font-size: 14px;
        }

        .checkbox-label input {
            width: auto;
        }

        label {
            font-size: 13px;
            color: #667085;
        }

        select,
        input {
            width: 100%;
            padding: 9px 10px;
            border-radius: 8px;
            border: 1px solid #d0d5dd;
            background: white;
            font-size: 14px;
        }

        button {
            border: none;
            border-radius: 8px;
            padding: 10px 12px;
            cursor: pointer;
            background: #2563eb;
            color: white;
            font-weight: 600;
            font-size: 14px;
        }

        button:disabled {
            cursor: not-allowed;
            background: #9ca3af;
        }

        .empty {
            color: #667085;
            font-size: 14px;
        }

        .error {
            padding: 12px;
            border-radius: 10px;
            background: #fee2e2;
            color: #991b1b;
            margin-bottom: 16px;
            display: none;
        }

        .hidden {
            display: none;
        }

        .stable {
            background: #dcfce7;
            color: #166534;
        }

        .warning {
            background: #fef3c7;
            color: #92400e;
        }

        .unstable {
            background: #ffedd5;
            color: #9a3412;
        }

        .critical {
            background: #fee2e2;
            color: #991b1b;
        }

        .chart-wrapper {
            margin-bottom: 16px;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            background: #fafafa;
        }

        canvas {
            width: 100%;
            height: 260px;
            display: block;
        }
    </style>
</head>

<body>
<header>
    <h1>Extrusion Quality Dashboard</h1>
    <div class="subtitle">Live monitoring of extrusion process telemetry, alerts and quality index</div>
</header>

<div id="error" class="error"></div>

<main class="layout">
    <section class="quality-card">
        <div class="quality-title">Current quality index</div>
        <div id="qualityValue" class="quality-value">Loading...</div>
        <div id="qualityState" class="quality-state">unknown</div>
    </section>

    <section class="section">
        <h2>Current parameters</h2>
        <div id="parameters" class="parameters-grid"></div>
    </section>

    <section class="section">
        <h2>Active events</h2>
        <div id="events" class="events-list"></div>
    </section>

    <section class="section">
        <h2>Telemetry history</h2>

        <div class="history-controls">
            <div class="control-group">
                <label for="historyParameter">Parameter</label>
                <select id="historyParameter">
                    <option value="pressure">Pressure</option>
                    <option value="moisture">Moisture</option>
                    <option value="barrel_temperature_zone_1">Barrel temperature zone 1</option>
                    <option value="barrel_temperature_zone_2">Barrel temperature zone 2</option>
                    <option value="barrel_temperature_zone_3">Barrel temperature zone 3</option>
                    <option value="screw_speed">Screw speed</option>
                    <option value="drive_load">Drive load</option>
                    <option value="outlet_temperature">Outlet temperature</option>
                </select>
            </div>

            <div class="control-group">
                <label for="historyRange">Period</label>
                <select id="historyRange" onchange="updateHistoryRangeControls()">
                    <option value="last_1h">Last hour</option>
                    <option value="last_2h">Last 2 hours</option>
                    <option value="today">Today</option>
                    <option value="last_2d">Last 2 days</option>
                    <option value="last_7d">Last 7 days</option>
                    <option value="custom">Custom range</option>
                </select>
            </div>

            <div id="customFromGroup" class="control-group hidden">
                <label for="historyFrom">From</label>
                <input id="historyFrom" type="datetime-local" />
            </div>

            <div id="customToGroup" class="control-group hidden">
                <label for="historyTo">To</label>
                <input id="historyTo" type="datetime-local" />
            </div>

            <div class="control-group">
                <label for="historyLimit">Limit</label>
                <input id="historyLimit" type="number" min="1" max="1000" value="200" />
            </div>

            <div class="control-group">
                <button id="loadHistoryButton" onclick="loadTelemetryHistory()">Load history</button>
            </div>

            <div class="control-group checkbox-group">
                <label class="checkbox-label">
                    <input id="historyAutoRefresh" type="checkbox" />
                    Auto-refresh history
                </label>
            </div>
        </div>

        <div class="chart-wrapper">
            <canvas id="historyChart"></canvas>
        </div>

        <div id="history" class="history-list">
            <div class="empty">Select parameter and load history</div>
        </div>
    </section>
</main>

<script src="/static/app.js"></script>
</body>
</html>
